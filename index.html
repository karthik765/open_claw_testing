<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap {
      text-align: center;
    }

    canvas {
      background: #111827;
      border: 2px solid #334155;
      border-radius: 10px;
    }

    .meta {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }

    .pill {
      background: #1e293b;
      padding: 6px 10px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Snake Game</h2>
    <canvas id="c" width="400" height="400"></canvas>

    <div class="meta">
      <span class="pill">Score: <b id="s">0</b></span>
      <span class="pill">Best: <b id="b">0</b></span>
    </div>

    <p>Arrows/WASD · Space restart</p>
  </div>

  <script>
    const c = document.getElementById('c');
    const x = c.getContext('2d');
    const g = 20;
    const n = 20;
    const S = document.getElementById('s');
    const B = document.getElementById('b');

    let sn, d, nd, f, sc, b, ok;
    let countdown = 5;
    let started = false;
    let startTimer = null;

    function reset() {
      sn = [{ x: 10, y: 10 }];
      d = { x: 1, y: 0 };
      nd = { x: 1, y: 0 };
      sc = 0;
      ok = true;
      started = false;
      countdown = 5;
      b = Number(localStorage.getItem('snake-best') || 0);
      placeFood();

      if (startTimer) clearInterval(startTimer);
      startTimer = setInterval(() => {
        countdown -= 1;
        if (countdown <= 0) {
          started = true;
          clearInterval(startTimer);
          startTimer = null;
        }
        draw();
      }, 1000);

      draw();
    }

    function placeFood() {
      while (true) {
        const t = {
          x: Math.floor(Math.random() * n),
          y: Math.floor(Math.random() * n)
        };

        if (!sn.some(v => v.x === t.x && v.y === t.y)) {
          f = t;
          return;
        }
      }
    }

    function setDir(dx, dy) {
      if (sn.length > 1 && dx === -d.x && dy === -d.y) return;
      nd = { x: dx, y: dy };
    }

    addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k === 'arrowup' || k === 'w') setDir(0, -1);
      if (k === 'arrowdown' || k === 's') setDir(0, 1);
      if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
      if (k === 'arrowright' || k === 'd') setDir(1, 0);
      if (k === ' ' && !ok) reset();
    });

    function tick() {
      if (!ok || !started) {
        draw();
        return;
      }

      d = nd;
      const h = {
        x: (sn[0].x + d.x + n) % n,
        y: (sn[0].y + d.y + n) % n
      };

      // only tail/self collision should end game
      if (sn.some(v => v.x === h.x && v.y === h.y)) {
        ok = false;
        draw();
        return;
      }

      sn.unshift(h);

      if (h.x === f.x && h.y === f.y) {
        sc++;
        if (sc > b) {
          b = sc;
          localStorage.setItem('snake-best', String(b));
        }
        placeFood();
      } else {
        sn.pop();
      }

      draw();
    }

    function drawMouse(foodX, foodY) {
      const cx = foodX * g + g / 2;
      const cy = foodY * g + g / 2;

      // body
      x.fillStyle = '#d1d5db';
      x.beginPath();
      x.ellipse(cx, cy, g * 0.32, g * 0.24, 0, 0, Math.PI * 2);
      x.fill();

      // ears
      x.fillStyle = '#fda4af';
      x.beginPath();
      x.arc(cx - 5, cy - 5, 3, 0, Math.PI * 2);
      x.arc(cx + 5, cy - 5, 3, 0, Math.PI * 2);
      x.fill();

      // eye
      x.fillStyle = '#111827';
      x.beginPath();
      x.arc(cx + 3, cy - 1, 1.2, 0, Math.PI * 2);
      x.fill();

      // tail
      x.strokeStyle = '#f9a8d4';
      x.lineWidth = 1.5;
      x.beginPath();
      x.moveTo(cx - 7, cy + 2);
      x.quadraticCurveTo(cx - 12, cy + 4, cx - 14, cy + 8);
      x.stroke();
    }

    function drawSnake() {
      sn.forEach((v, i) => {
        const cx = v.x * g + g / 2;
        const cy = v.y * g + g / 2;

        x.fillStyle = i ? '#22c55e' : '#4ade80';
        x.beginPath();
        x.arc(cx, cy, g * 0.4, 0, Math.PI * 2);
        x.fill();

        if (i === 0) {
          const ex = d.x === 0 ? 3 : d.x * 3;
          const ey = d.y === 0 ? 3 : d.y * 3;

          x.fillStyle = '#fff';
          x.beginPath();
          x.arc(cx - ey, cy - ex, 2.1, 0, Math.PI * 2);
          x.arc(cx + ey, cy + ex, 2.1, 0, Math.PI * 2);
          x.fill();

          x.fillStyle = '#111827';
          x.beginPath();
          x.arc(cx - ey, cy - ex, 1, 0, Math.PI * 2);
          x.arc(cx + ey, cy + ex, 1, 0, Math.PI * 2);
          x.fill();
        }
      });
    }

    function drawOverlay(text1, text2 = '') {
      x.fillStyle = 'rgba(0, 0, 0, 0.55)';
      x.fillRect(0, 0, 400, 400);
      x.fillStyle = '#fff';
      x.textAlign = 'center';
      x.font = 'bold 28px system-ui';
      x.fillText(text1, 200, 188);
      if (text2) {
        x.font = '16px system-ui';
        x.fillText(text2, 200, 220);
      }
    }

    function draw() {
      x.fillStyle = '#111827';
      x.fillRect(0, 0, 400, 400);

      drawMouse(f.x, f.y);
      drawSnake();

      S.textContent = String(sc);
      B.textContent = String(b);

      if (!started && ok) {
        drawOverlay(`Starting in ${countdown}...`, 'Get ready!');
      }

      if (!ok) {
        drawOverlay('Game Over', 'Press Space to restart');
      }
    }

    reset();
    setInterval(tick, 120);
  </script>
</body>
</html>
