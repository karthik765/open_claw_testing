<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game (2D)</title>
  <style>
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #0f172a 60%);
      color: #e2e8f0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap { text-align: center; }

    canvas {
      background: linear-gradient(180deg, #0b1220, #111827);
      border: 2px solid #334155;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .meta {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .pill {
      background: #1e293b;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Snake Game — 2D Mode</h2>
    <canvas id="c" width="700" height="420"></canvas>

    <div class="meta">
      <span class="pill">Score: <b id="s">0</b></span>
      <span class="pill">Best: <b id="b">0</b></span>
      <span class="pill">Mode: Smooth 2D</span>
    </div>

    <p>Arrows/WASD to move · Space to restart</p>
  </div>

  <script>
    const c = document.getElementById('c');
    const x = c.getContext('2d');
    const S = document.getElementById('s');
    const B = document.getElementById('b');

    const W = c.width;
    const H = c.height;
    const SPEED = 140; // px/sec
    const SEG_GAP = 16;
    const FOOD_R = 9;

    let score = 0;
    let best = Number(localStorage.getItem('snake-best') || 0);
    let alive = true;
    let started = false;
    let countdown = 5;

    let snake = [];
    let dir = { x: 1, y: 0 };
    let nextDir = { x: 1, y: 0 };
    let food = { x: 120, y: 120 };

    let last = performance.now();
    let timer = null;

    function reset() {
      snake = [];
      const startX = W / 2;
      const startY = H / 2;
      for (let i = 0; i < 12; i++) {
        snake.push({ x: startX - i * SEG_GAP, y: startY });
      }

      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      alive = true;
      started = false;
      countdown = 5;
      placeFood();

      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          started = true;
          clearInterval(timer);
          timer = null;
        }
      }, 1000);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function placeFood() {
      let safe = false;
      while (!safe) {
        food.x = random(30, W - 30);
        food.y = random(30, H - 30);
        safe = !snake.some(s => dist(s.x, s.y, food.x, food.y) < 24);
      }
    }

    function dist(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      return Math.hypot(dx, dy);
    }

    function setDir(dx, dy) {
      if (!alive) return;
      if (dx === -dir.x && dy === -dir.y) return;
      nextDir = { x: dx, y: dy };
    }

    addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k === 'arrowup' || k === 'w') setDir(0, -1);
      if (k === 'arrowdown' || k === 's') setDir(0, 1);
      if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
      if (k === 'arrowright' || k === 'd') setDir(1, 0);
      if (k === ' ' && !alive) reset();
    });

    function update(dt) {
      if (!alive || !started) return;

      dir = nextDir;

      const head = snake[0];
      const nx = (head.x + dir.x * SPEED * dt + W) % W;
      const ny = (head.y + dir.y * SPEED * dt + H) % H;
      snake.unshift({ x: nx, y: ny });

      // self collision only (ignore nearby body points to avoid false hits on turns)
      // Since movement is smooth and body is sampled every frame, the first chunk of
      // points is always close to the head.
      for (let i = 28; i < snake.length; i++) {
        if (dist(nx, ny, snake[i].x, snake[i].y) < 6) {
          alive = false;
          return;
        }
      }

      // eat food
      if (dist(nx, ny, food.x, food.y) < 14) {
        score += 1;
        if (score > best) {
          best = score;
          localStorage.setItem('snake-best', String(best));
        }
        // grow by leaving tail as-is this frame
        placeFood();
      } else {
        // keep body length based on score
        const targetLen = 12 + score * 2;
        while (snake.length > targetLen) snake.pop();
      }
    }

    function drawMouse() {
      const cx = food.x;
      const cy = food.y;

      x.fillStyle = '#d1d5db';
      x.beginPath();
      x.ellipse(cx, cy, 10, 7, 0, 0, Math.PI * 2);
      x.fill();

      x.fillStyle = '#fda4af';
      x.beginPath();
      x.arc(cx - 5, cy - 5, 3, 0, Math.PI * 2);
      x.arc(cx + 5, cy - 5, 3, 0, Math.PI * 2);
      x.fill();

      x.fillStyle = '#111827';
      x.beginPath();
      x.arc(cx + 3, cy - 1, 1.2, 0, Math.PI * 2);
      x.fill();

      x.strokeStyle = '#f9a8d4';
      x.lineWidth = 2;
      x.beginPath();
      x.moveTo(cx - 9, cy + 2);
      x.quadraticCurveTo(cx - 16, cy + 4, cx - 20, cy + 11);
      x.stroke();
    }

    function drawSnake() {
      for (let i = snake.length - 1; i >= 0; i--) {
        const p = snake[i];
        const t = i / snake.length;
        const r = 4 + (1 - t) * 4;
        x.fillStyle = i === 0 ? '#4ade80' : `rgba(34,197,94,${0.5 + (1 - t) * 0.4})`;
        x.beginPath();
        x.arc(p.x, p.y, r, 0, Math.PI * 2);
        x.fill();
      }

      const h = snake[0];
      if (!h) return;

      const ex = dir.x === 0 ? 3 : dir.x * 3;
      const ey = dir.y === 0 ? 3 : dir.y * 3;

      x.fillStyle = '#fff';
      x.beginPath();
      x.arc(h.x + ey, h.y + ex, 2.2, 0, Math.PI * 2);
      x.arc(h.x - ey, h.y - ex, 2.2, 0, Math.PI * 2);
      x.fill();

      x.fillStyle = '#111827';
      x.beginPath();
      x.arc(h.x + ey, h.y + ex, 1.1, 0, Math.PI * 2);
      x.arc(h.x - ey, h.y - ex, 1.1, 0, Math.PI * 2);
      x.fill();
    }

    function overlay(t1, t2 = '') {
      x.fillStyle = 'rgba(0, 0, 0, 0.5)';
      x.fillRect(0, 0, W, H);
      x.fillStyle = '#fff';
      x.textAlign = 'center';
      x.font = 'bold 34px system-ui';
      x.fillText(t1, W / 2, H / 2 - 8);
      if (t2) {
        x.font = '16px system-ui';
        x.fillText(t2, W / 2, H / 2 + 24);
      }
    }

    function render() {
      x.clearRect(0, 0, W, H);

      // subtle grid
      x.strokeStyle = 'rgba(148,163,184,0.08)';
      x.lineWidth = 1;
      for (let i = 0; i <= W; i += 20) {
        x.beginPath(); x.moveTo(i, 0); x.lineTo(i, H); x.stroke();
      }
      for (let i = 0; i <= H; i += 20) {
        x.beginPath(); x.moveTo(0, i); x.lineTo(W, i); x.stroke();
      }

      drawMouse();
      drawSnake();

      S.textContent = String(score);
      B.textContent = String(best);

      if (!started && alive) overlay(`Starting in ${countdown}...`, 'Get ready!');
      if (!alive) overlay('Game Over', 'Press Space to restart');
    }

    function loop(ts) {
      const dt = Math.min(0.032, (ts - last) / 1000);
      last = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
